name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memory_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d memory_os"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      APP_NAME: memory-os
      APP_ENV: ci
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/memory_os
      REDIS_URL: redis://localhost:6379/0
      EMBEDDING_MODEL: local-stub
      EMBEDDING_DIM: 1536
      DEFAULT_MAX_CONTEXT_TOKENS: 1200
      DEFAULT_TOP_K: 5
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      ARCHIVE_PROVIDER: local
      ARCHIVE_BUCKET: memory-archive
      ARCHIVE_ENDPOINT: http://localhost:9000
      ARCHIVE_ACCESS_KEY: minioadmin
      ARCHIVE_SECRET_KEY: minioadmin
      LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Init database
        run: |
          python -m app.db.init_db
          python scripts/create_vector_indexes.py

      - name: Run tests
        run: |
          pytest -q
