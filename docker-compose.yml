version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memory_os_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: memory_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: memory_os_redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: memory_os_app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  worker:
    build: .
    container_name: memory_os_worker
    command: celery -A app.workers.runner.celery_app worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  beat:
    build: .
    container_name: memory_os_beat
    command: celery -A app.workers.runner.celery_app beat --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

volumes:
  postgres_data:
